name: philosophie_quiz
description: "Eleutheria — ein Philosophie-Quiz im warmen Akademia-Stil."
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Persistence
  shared_preferences: ^2.2.3

  # Backend (online VS, leaderboards) — falls SUPABASE_URL leer ist, bleibt es ungenutzt
  supabase_flutter: ^2.5.6

  # UI / animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Utilities
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/modes/
    - assets/images/philosophers/
    - assets/textures/
    - assets/icons/
    - assets/icons/modes/
    - assets/data/
