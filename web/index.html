<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Griphos — philosophische Rätsel und Denkspiele.">
  <meta name="theme-color" content="#F5EFE6">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Griphos">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Griphos</title>
  <style>
    html, body { margin: 0; padding: 0; background: #2A1810; }
    #loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background:
        linear-gradient(180deg, rgba(245,239,230,.38), rgba(245,239,230,.74)),
        url("assets/assets/images/splash.png") center / cover no-repeat,
        #F5EFE6;
      transition: opacity .4s ease;
      color: #2A1810;
      overflow: hidden;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    #loader::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 42%, transparent 0 24%, rgba(42,24,16,.10) 82%);
      pointer-events: none;
    }
    #loader.fade { opacity: 0; pointer-events: none; }
    #loader .loader-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transform: translateY(-2vh);
    }
    #loader .loader-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    #loader .loader-subtitle {
      margin-top: -8px;
      color: #6B2737;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
    }
    #loader .loader-glyphs {
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }
    #loader .loader-glyphs span {
      width: 34px; height: 34px;
      display: grid; place-items: center;
      border-radius: 10px;
      border: 1px solid rgba(42,24,16,.14);
      background: rgba(250,246,238,.62);
      color: #6B2737;
      font-size: 18px;
      box-shadow: 0 6px 18px rgba(42,24,16,.06);
    }
    #loader .loader-rail {
      width: 148px;
      height: 4px;
      margin-top: 4px;
      border-radius: 999px;
      background: rgba(42,24,16,.14);
      overflow: hidden;
    }
    #loader .loader-rail span {
      display: block;
      width: 46%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #C9A961, #6B2737);
      animation: load 1.8s ease-in-out infinite;
    }
    @keyframes load {
      0% { transform: translateX(-105%); }
      55%, 100% { transform: translateX(225%); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loader" aria-label="Griphos lädt">
    <div class="loader-inner">
      <div class="loader-title">Griphos</div>
      <div class="loader-subtitle">philosophische Rätsel und Denkspiele</div>
      <div class="loader-glyphs" aria-hidden="true">
        <span>ϟ</span><span>Ⅲ</span><span>↔</span><span>▦</span>
      </div>
      <div class="loader-rail"><span></span></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      const l = document.getElementById('loader');
      if (l) { l.classList.add('fade'); setTimeout(() => l.remove(), 500); }
    });
  </script>
</body>
</html>
