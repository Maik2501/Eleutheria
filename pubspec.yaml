name: philosophie_quiz
description: "Griphos — philosophische Rätsel und Denkspiele."
publish_to: 'none'
version: 1.0.1+11

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Persistence
  shared_preferences: ^2.2.3

  # Backend (online VS, leaderboards) — falls SUPABASE_URL leer ist, bleibt es ungenutzt
  supabase_flutter: ^2.5.6

  # UI / animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Duell-Lobby: QR-Code anzeigen (Host) + scannen (Gast)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Utilities
  uuid: ^4.4.0

  # Externe Links öffnen (z. B. PayPal.me für Spenden)

  cupertino_icons: ^1.0.8
  package_info_plus: ^10.1.0
  in_app_purchase: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/modes/
    - assets/images/philosophers/
    - assets/textures/
    - assets/icons/
    - assets/icons/modes/
    - assets/icons/achievements/
    - assets/data/
